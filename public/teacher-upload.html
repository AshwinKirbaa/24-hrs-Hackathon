<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Upload &amp; Rubric · TwinEval AI</title>
  <link rel="stylesheet" href="assets/css/design-system.css" />
  <link rel="stylesheet" href="assets/css/overlays.css" />
  <style>
    .dropzone { border: 2px dashed var(--hairline-strong); border-radius: var(--r-xl); padding: 40px; text-align: center; background: var(--surface-glass); cursor: pointer; }
    .criterion { display: grid; grid-template-columns: 1.4fr 1fr 100px auto; gap: 10px; align-items:end; }
    @media (max-width: 720px) { .criterion { grid-template-columns: 1fr; } }
  </style>
</head>
<body class="theme-teacher">
  <div id="shell" data-role="teacher" data-active="upload" data-title="Upload & Rubric"></div>

  <main class="page">
    <div class="page-header anim-fadeup">
      <div>
        <h1 class="h1">Create an assignment</h1>
        <div class="sub">Define a rubric, attach a model answer, and configure Bloom's targets.</div>
      </div>
      <a href="teacher-dashboard.html" class="btn btn-ghost">Cancel</a>
    </div>

    <section class="grid" style="grid-template-columns: 1.3fr 1fr; gap: var(--s-3);">
      <div class="card">
        <h2 class="h3">Assignment details</h2>
        <div class="grid grid-2 mt-3">
          <div class="field"><label class="label" for="titleInput">Assignment title</label><input id="titleInput" class="input" placeholder="e.g. Mid-term 2 — DS" /></div>
          <div class="field"><label class="label" for="subjectInput">Subject</label><input id="subjectInput" class="input" placeholder="e.g. Data Structures" /></div>
          <div class="field"><label class="label" for="courseCodeInput">Course code</label><input id="courseCodeInput" class="input" placeholder="e.g. CS201" /></div>
          <div class="field"><label class="label" for="dueDateInput">Due date</label><input id="dueDateInput" class="input" type="date" /></div>
        </div>

        <h2 class="h3 mt-5">Rubric criteria</h2>
        <div class="text-sm text-muted">Add each criterion and its weight. Total must equal 100.</div>
        <div class="stack gap-2 mt-3" id="rubric">
          <div class="criterion">
            <div class="field"><label class="label">Criterion</label><input class="input crit-name" placeholder="e.g. Correctness" /></div>
            <div class="field"><label class="label">Description</label><input class="input crit-desc" placeholder="What is being assessed" /></div>
            <div class="field"><label class="label">Weight (%)</label><input class="input crit-weight" type="number" min="0" max="100" placeholder="0" /></div>
            <button type="button" class="btn btn-ghost btn-sm" onclick="event.preventDefault(); this.closest('.criterion').remove();">Remove</button>
          </div>
        </div>
        <button type="button" class="btn btn-ghost mt-3" onclick="addRow(event)">+ Add criterion</button>
      </div>

      <div class="card">
        <h2 class="h3">Model answer</h2>
        <div class="text-sm text-muted">Upload or paste a model answer for calibration.</div>
        <label class="dropzone mt-3" id="modelDropzone">
          <input type="file" id="modelFileInput" hidden accept="image/*,.pdf" />
          <div class="empty-illustration" style="margin: 0 auto 8px">
            <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 16V4M6 10l6-6 6 6"/><path d="M4 20h16"/></svg>
          </div>
          <div id="modelFileName">Drop model answer PDF or click to upload</div>
        </label>
        <div class="field mt-3">
          <label class="label" for="modelAnswerText">Or paste model answer</label>
          <textarea id="modelAnswerText" class="textarea" placeholder="Paste model answer here…"></textarea>
        </div>

        <h2 class="h3 mt-5">Bloom's targets</h2>
        <div class="stack gap-2 mt-3" id="bloomTargets">
          <label class="checkbox"><input type="checkbox" value="Remember" checked /> Remember</label>
          <label class="checkbox"><input type="checkbox" value="Understand" checked /> Understand</label>
          <label class="checkbox"><input type="checkbox" value="Apply" checked /> Apply</label>
          <label class="checkbox"><input type="checkbox" value="Analyse" /> Analyse</label>
          <label class="checkbox"><input type="checkbox" value="Evaluate" /> Evaluate</label>
          <label class="checkbox"><input type="checkbox" value="Create" /> Create</label>
        </div>

        <button id="publishAssignmentBtn" type="button" class="btn btn-primary btn-block mt-5">Publish assignment</button>
      </div>
    </section>
  </main>

  <script src="assets/js/shell.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/script.js"></script>
  <script src="assets/js/teacher.js"></script>
  <script>
    function addRow(e){
      e.preventDefault();
      var host = document.getElementById("rubric");
      var d = document.createElement("div");
      d.className = "criterion";
      d.innerHTML =
        '<div class="field"><label class="label">Criterion</label><input class="input crit-name" placeholder="e.g. Clarity" /></div>' +
        '<div class="field"><label class="label">Description</label><input class="input crit-desc" placeholder="What is being assessed" /></div>' +
        '<div class="field"><label class="label">Weight (%)</label><input class="input crit-weight" type="number" min="0" max="100" placeholder="0" /></div>' +
        '<button type="button" class="btn btn-ghost btn-sm" onclick="event.preventDefault(); this.closest(&quot;.criterion&quot;).remove();">Remove</button>';
      host.appendChild(d);
    }

    document.addEventListener("DOMContentLoaded", function() {
      const modelDropzone = document.getElementById("modelDropzone");
      const modelFileInput = document.getElementById("modelFileInput");
      const modelFileName = document.getElementById("modelFileName");

      if (modelDropzone && modelFileInput) {
        modelDropzone.addEventListener("click", function() { modelFileInput.click(); });
        modelFileInput.addEventListener("change", function() {
          if (modelFileInput.files.length > 0) {
            modelFileName.textContent = "Selected: " + modelFileInput.files[0].name;
            if (window.TwinEvalApp && window.TwinEvalApp.showToast) {
              window.TwinEvalApp.showToast("Model Answer Selected", modelFileInput.files[0].name, "success");
            }
          }
        });
      }

      document.getElementById("publishAssignmentBtn").addEventListener("click", async function() {
        const title = document.getElementById("titleInput").value || "New Assignment";
        const subject = document.getElementById("subjectInput").value || "Data Structures";
        const course_code = document.getElementById("courseCodeInput").value || "CS201";
        const due_date = document.getElementById("dueDateInput").value || "";
        const model_answer_text = document.getElementById("modelAnswerText").value || "";

        const criteria = [];
        document.querySelectorAll("#rubric .criterion").forEach(row => {
          const name = row.querySelector(".crit-name")?.value;
          const desc = row.querySelector(".crit-desc")?.value;
          const weight = row.querySelector(".crit-weight")?.value;
          if (name) {
            criteria.push({ criterion: name, description: desc || "", weight: parseInt(weight || "0", 10) });
          }
        });

        const bloom_targets = [];
        document.querySelectorAll("#bloomTargets input:checked").forEach(cb => {
          bloom_targets.push(cb.value);
        });

        const token = localStorage.getItem("token");
        const formData = new FormData();
        formData.append("title", title);
        formData.append("subject", subject);
        formData.append("course_code", course_code);
        formData.append("due_date", due_date);
        formData.append("model_answer_text", model_answer_text);
        formData.append("criteria", JSON.stringify(criteria));
        formData.append("bloom_targets", JSON.stringify(bloom_targets));

        if (modelFileInput && modelFileInput.files.length > 0) {
          formData.append("model_answer", modelFileInput.files[0]);
        }

        const apiUrl = (window.TwinEval && window.TwinEval.getApiUrl) ? window.TwinEval.getApiUrl("/api/teacher/assignments") : "/api/teacher/assignments";

        try {
          if (token) {
            const res = await fetch(apiUrl, {
              method: "POST",
              headers: { "Authorization": "Bearer " + token },
              body: formData
            });
            const json = await res.json();
            if (json.success) {
              if (window.TwinEvalApp && window.TwinEvalApp.showToast) {
                window.TwinEvalApp.showToast("Assignment Published", "New assignment and rubric standards active.", "success");
              }
            }
          }
        } catch(e) {
          console.error("Assignment Publish Error:", e);
        }

        setTimeout(() => { window.location.href = "teacher-dashboard.html"; }, 800);
      });
    });
  </script>
</body>
</html>
