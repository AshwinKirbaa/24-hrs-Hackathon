<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Create Student Account · TwinEval AI</title>
  <link rel="stylesheet" href="assets/css/design-system.css" />
  <link rel="stylesheet" href="assets/css/overlays.css" />
</head>
<body>
  <div class="auth">
    <aside class="auth-aside">
      <div class="blob b1"></div>
      <div class="blob b2"></div>
      <div style="position:relative;z-index:1">
        <div class="brand">
          <div class="brand-mark">T</div>
          <div>
            <div class="brand-name">TwinEval AI</div>
            <div class="brand-sub">Create your account</div>
          </div>
        </div>
        <div class="mt-6 quote">
          Join a workspace built to help you <span>learn from every evaluation</span> — with explainable scoring and personalised feedback.
        </div>
      </div>
      <div class="row gap-2 text-sm text-muted" style="position:relative;z-index:1">
        <span class="badge">Free for students</span>
        <span class="badge">No credit card</span>
      </div>
    </aside>

    <section class="auth-form">
      <form id="signupForm" class="auth-card anim-fadeup">
        <div>
          <h1 class="auth-title">Create your student account</h1>
          <p class="auth-sub mt-2">A few details to personalise your workspace.</p>
        </div>

        <div class="grid grid-2">
          <div class="field">
            <label class="label" for="full_name">Full name</label>
            <input id="full_name" class="input" placeholder="Jane Doe" required />
          </div>
          <div class="field">
            <label class="label" for="email">Email</label>
            <input id="email" class="input" type="email" placeholder="you@college.edu" required />
          </div>
          <div class="field">
            <label class="label" for="college">College</label>
            <input id="college" class="input" placeholder="Institute name" required />
          </div>
          <div class="field">
            <label class="label" for="department">Department</label>
            <input id="department" class="input" placeholder="e.g. Computer Science" required />
          </div>
          <div class="field">
            <label class="label" for="year">Year</label>
            <select id="year" class="select" required>
              <option value="">Select year</option>
              <option value="1st Year">1st Year</option>
              <option value="2nd Year">2nd Year</option>
              <option value="3rd Year">3rd Year</option>
              <option value="4th Year">4th Year</option>
            </select>
          </div>
          <div class="field">
            <label class="label" for="roll_number">Roll number</label>
            <input id="roll_number" class="input" placeholder="e.g. 21CS042" required />
          </div>
          <div class="field">
            <label class="label" for="password">Password</label>
            <input id="password" class="input" type="password" placeholder="Min 8 characters" required />
          </div>
          <div class="field">
            <label class="label" for="confirm_password">Confirm password</label>
            <input id="confirm_password" class="input" type="password" placeholder="Re-enter password" required />
          </div>
        </div>

        <label class="checkbox"><input type="checkbox" required /> I agree to the Terms of Service and Privacy Policy.</label>

        <button type="submit" class="btn btn-primary btn-block btn-lg">Create Account</button>

        <p class="text-sm text-muted" style="text-align:center;margin:0">
          Already have an account? <a href="student-login.html">Sign in</a>
        </p>
      </form>
    </section>
  </div>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/script.js"></script>
  <script>
    document.getElementById("signupForm").addEventListener("submit", async function (e) {
      e.preventDefault();
      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirm_password").value;

      if (password !== confirmPassword) {
        alert("Passwords do not match.");
        return;
      }

      const payload = {
        full_name: document.getElementById("full_name").value,
        email: document.getElementById("email").value,
        college: document.getElementById("college").value,
        department: document.getElementById("department").value,
        year: document.getElementById("year").value,
        roll_number: document.getElementById("roll_number").value,
        password: password
      };

      const apiUrl = (window.TwinEval && window.TwinEval.getApiUrl) ? window.TwinEval.getApiUrl("/api/auth/student/signup") : "/api/auth/student/signup";

      try {
        const response = await fetch(apiUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const data = await response.json();
        if (data.success) {
          localStorage.setItem("token", data.data.token);
          localStorage.setItem("user", JSON.stringify(data.data.user));
          TwinEval.showSuccess("Account Created Successfully", "student-login.html");
        } else {
          alert(data.message || "Failed to create account.");
        }
      } catch (err) {
        console.error(err);
        alert("Unable to connect to server.");
      }
    });
  </script>
</body>
</html>
