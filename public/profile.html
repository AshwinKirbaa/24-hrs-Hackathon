<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Profile · TwinEval AI</title>
  <link rel="stylesheet" href="assets/css/design-system.css" />
  <link rel="stylesheet" href="assets/css/overlays.css" />
</head>
<body>
  <div id="shell" data-role="student" data-active="profile" data-title="Profile"></div>

  <main class="page">
    <div class="page-header anim-fadeup">
      <div>
        <h1 class="h1">Your profile</h1>
        <div class="sub">Keep your workspace details up to date.</div>
      </div>
      <button id="saveProfileBtn" class="btn btn-primary">Save changes</button>
    </div>

    <section class="grid" style="grid-template-columns: 320px 1fr; gap: var(--s-3);">
      <div class="card" style="text-align:center">
        <div class="avatar" id="avatarBox" style="width:96px;height:96px;font-size:28px;margin:0 auto">TE</div>
        <div class="h3 mt-3" id="profileNameDisplay">User</div>
        <div class="text-sm text-muted" id="profileRoleDisplay">Student Account</div>
        <button class="btn btn-ghost btn-block mt-4">Change avatar</button>
      </div>

      <div class="card">
        <h2 class="h3">Personal information</h2>
        <div class="grid grid-2 mt-3">
          <div class="field"><label class="label" for="profName">Full name</label><input id="profName" class="input" placeholder="Add your name" /></div>
          <div class="field"><label class="label" for="profEmail">Email</label><input id="profEmail" class="input" type="email" placeholder="Add email" /></div>
          <div class="field"><label class="label" for="profCollege">College</label><input id="profCollege" class="input" placeholder="Add college" /></div>
          <div class="field"><label class="label" for="profDept">Department</label><input id="profDept" class="input" placeholder="Add department" /></div>
          <div class="field"><label class="label" for="profYear">Year</label>
            <select id="profYear" class="select"><option value="">Select year</option><option value="1st Year">1st Year</option><option value="2nd Year">2nd Year</option><option value="3rd Year">3rd Year</option><option value="4th Year">4th Year</option></select>
          </div>
          <div class="field"><label class="label" for="profRoll">Roll number</label><input id="profRoll" class="input" placeholder="Add roll number" /></div>
        </div>
      </div>
    </section>

    <section class="card">
      <h2 class="h3">Learning summary</h2>
      <div class="empty mt-3">
        <div class="empty-illustration">📈</div>
        <h3>No learning history yet.</h3>
        <p>Once you complete evaluations, your growth summary appears here.</p>
      </div>
    </section>
  </main>

  <script src="assets/js/shell.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/script.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const rawUser = localStorage.getItem("user");
      if (rawUser) {
        try {
          const user = JSON.parse(rawUser);
          if (user.full_name) {
            document.getElementById("profName").value = user.full_name;
            document.getElementById("profileNameDisplay").textContent = user.full_name;
            const initials = user.full_name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
            document.getElementById("avatarBox").textContent = initials || "TE";
          }
          if (user.email) document.getElementById("profEmail").value = user.email;
          if (user.college) document.getElementById("profCollege").value = user.college;
          if (user.department) document.getElementById("profDept").value = user.department;
          if (user.year) document.getElementById("profYear").value = user.year;
          if (user.roll_number) document.getElementById("profRoll").value = user.roll_number;
          if (user.role) document.getElementById("profileRoleDisplay").textContent = user.role.toUpperCase() + " Workspace";
        } catch(e) {}
      }

      document.getElementById("saveProfileBtn").addEventListener("click", function() {
        if (window.TwinEvalApp && window.TwinEvalApp.showToast) {
          window.TwinEvalApp.showToast("Profile Updated", "Your profile details have been saved.", "success");
        } else {
          alert("Profile details updated.");
        }
      });
    });
  </script>
</body>
</html>
